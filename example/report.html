<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Create Report - Inventiv Critic</title>
    <link href="report.css" media="all" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <div class="formarea">
      <h1 class="center">Critic Report Example</h1>
      <div class="center">
        Please tell us about your experience!
      </div>
      <hr/>
      <form enctype="multipart/form-data" id="report_create">
        <p>
          <label for="report_description">Describe Your Experience</label>
          <textarea id="report_description" name="report[description]"></textarea>
        </p>
        <p>
          <label>Rate Your Experience</label>
          <span id="star_rating"></span>
        </p>
        <p>
          <label for="report_attachments">Screenshots (Optional)</label>
          <input type="file" id="report_attachments" name="report[attachments][]" multiple />
        </p>
        <p class="center">
          <button type="submit">Submit Report</button>
        </p>
      </form>
    </div>

    <script defer src="https://use.fontawesome.com/releases/v5.0.6/js/all.js"></script>
    <script src="../dist/index.global.js"></script>
    <script>
      // --- Configuration ---
      const API_TOKEN = "YOUR_API_TOKEN";
      const APP_INSTALL_ID = "YOUR_APP_INSTALL_ID";

      // --- Star rating ---
      let currentRating = 3;

      function renderStars() {
        const container = document.getElementById("star_rating");
        container.innerHTML = "";
        for (let i = 1; i <= 5; i++) {
          const star = document.createElement("i");
          star.className = i <= currentRating ? "fas fa-star" : "far fa-star";
          star.style.cursor = "pointer";
          star.addEventListener("click", () => {
            currentRating = i;
            renderStars();
          });
          container.appendChild(star);
        }
      }

      renderStars();

      // --- Form submission using the Critic SDK ---
      document.getElementById("report_create").addEventListener("submit", async (e) => {
        e.preventDefault();

        if (API_TOKEN === "YOUR_API_TOKEN") {
          alert("You need to specify your own API token!");
          return;
        }

        const description = document.getElementById("report_description").value;
        const files = Array.from(document.getElementById("report_attachments").files);

        const client = new Critic.CriticClient({
          apiToken: API_TOKEN,
        });

        try {
          await client.createBugReport(
            APP_INSTALL_ID,
            {
              description,
              metadata: { star_rating: currentRating },
            },
            files.length > 0 ? files : undefined,
          );
          alert("Thank you! Your report has been submitted.");
        } catch (err) {
          console.error("Failed to submit report:", err);
          alert("Something went wrong. Please try again.");
        }
      });
    </script>
  </body>
</html>
