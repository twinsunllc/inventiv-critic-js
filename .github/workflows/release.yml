name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v2.0.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build, Test & Release
    runs-on: ubuntu-latest

    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v3.5.3
        with:
          ref: ${{ steps.tag.outputs.name }}

      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: 20
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Verify package.json version matches tag
        run: |
          TAG_VERSION="${{ steps.tag.outputs.name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Extract changelog notes
        id: changelog
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          VERSION="${TAG#v}"

          # Extract the section for this version from CHANGELOG.md
          # Grab everything between this version header and the next one
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](./CHANGELOG.md) for details."
          fi

          # Write to a temp file to avoid quoting issues with multiline strings
          echo "$NOTES" > /tmp/release-notes.md
          echo "notes_file=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create dist archive
        run: |
          tar -czf critic-js-dist-${{ steps.tag.outputs.name }}.tar.gz dist/
          zip -r critic-js-dist-${{ steps.tag.outputs.name }}.zip dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.name }}" \
            --title "${{ steps.tag.outputs.name }}" \
            --notes-file "${{ steps.changelog.outputs.notes_file }}" \
            --verify-tag \
            "critic-js-dist-${{ steps.tag.outputs.name }}.tar.gz" \
            "critic-js-dist-${{ steps.tag.outputs.name }}.zip"

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ""
